name: Deploy VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets exist
        run: |
          test -n "${{ secrets.VPS_HOST }}" || (echo "VPS_HOST missing" && exit 1)
          test -n "${{ secrets.VPS_USER }}" || (echo "VPS_USER missing" && exit 1)
          test -n "${{ secrets.VPS_SSH_KEY }}" || (echo "VPS_SSH_KEY missing" && exit 1)
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: /opt/deploy-vig.sh
